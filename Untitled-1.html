<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauge Chart UI</title>
    <style>
        /* Importando uma fonte limpa e moderna parecida com a do vídeo */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            background-color: #121815; /* Fundo geral escuro */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }

        .gauge-card {
            background-color: #212824; /* Fundo do card */
            border-radius: 12px;
            padding: 24px;
            width: 280px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #e0e5e2;
        }

        .icon-box {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #4ade80;
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .info-icon {
            color: #83928a;
            cursor: pointer;
            transition: color 0.3s;
        }

        .info-icon:hover {
            color: #ffffff;
        }

        .gauge-container {
            position: relative;
            display: flex;
            justify-content: center;
        }

        svg {
            width: 100%;
            overflow: visible;
        }

        /* Fundo do medidor (Cinza Escuro) */
        .track {
            fill: none;
            stroke: #2e3a33;
            stroke-width: 16;
            stroke-linecap: round;
        }

        /* Barra de Progresso Realizado (Verde) */
        .completed-bar {
            fill: none;
            stroke: #4ade80;
            stroke-width: 16;
            stroke-linecap: round;
            stroke-dasharray: 235.62; /* Comprimento = PI * raio(75) */
            stroke-dashoffset: 235.62;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Barra de Planejado (Laranja e mais fina, por fora) */
        .planned-bar {
            fill: none;
            stroke: #f28e2b;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 267.04; /* Comprimento = PI * raio(85) */
            stroke-dashoffset: 267.04;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Container do Ponteiro Laranja */
        .pointer-group {
            transform-origin: 100px 100px;
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .pointer {
            fill: #f28e2b;
        }

        .values-container {
            position: absolute;
            bottom: 5px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: baseline;
        }

        .val-completed {
            font-size: 44px;
            font-weight: 700;
            line-height: 1;
        }

        .val-planned {
            font-size: 20px;
            font-weight: 600;
            color: #83928a;
            margin-left: 4px;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            font-size: 13px;
            font-weight: 600;
            color: #83928a;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .color-box {
            width: 8px;
            height: 14px;
            border-radius: 2px;
        }

        .color-box.green {
            background-color: #4ade80;
        }

        .color-box.orange {
            background-color: #f28e2b;
        }
    </style>
</head>
<body>

<div class="gauge-card">
    <div class="header">
        <div class="title">
            <div class="icon-box">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#121815" stroke-width="4" stroke-linecap="round">
                    <line x1="4" y1="9" x2="20" y2="9"></line>
                    <line x1="4" y1="15" x2="20" y2="15"></line>
                </svg>
            </div>
            LP - 1
        </div>
        <div class="info-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="4" ry="4"></rect>
                <circle cx="12" cy="8" r="1"></circle>
                <line x1="12" y1="12" x2="12" y2="16"></line>
            </svg>
        </div>
    </div>

    <div class="gauge-container">
        <svg viewBox="0 0 200 115">
            <path class="track" d="M 25 100 A 75 75 0 0 1 175 100" />
            
            <path class="completed-bar" id="completed-bar" d="M 25 100 A 75 75 0 0 1 175 100" />
            
            <path class="planned-bar" id="planned-bar" d="M 15 100 A 85 85 0 0 1 185 100" />
            
            <g class="pointer-group" id="pointer-group">
                <polygon class="pointer" points="5,96 5,104 15,100" />
            </g>
        </svg>

        <div class="values-container">
            <span class="val-completed" id="val-completed">0</span>
            <span class="val-planned" id="val-planned">/0</span>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="color-box green"></div>
            Completed
        </div>
        <div class="legend-item">
            <div class="color-box orange"></div>
            Planed </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // --- CONFIGURAÇÃO DOS DADOS ---
        const completedValue = 39;
        const plannedValue = 58;
        const maxScale = 100; // Define o 100% da curva do relógio

        // Mapeando os elementos HTML
        const completedBar = document.getElementById('completed-bar');
        const plannedBar = document.getElementById('planned-bar');
        const pointerGroup = document.getElementById('pointer-group');
        const valCompleted = document.getElementById('val-completed');
        const valPlanned = document.getElementById('val-planned');

        // Constantes matemáticas do SVG baseado nos Raios (r=75 e r=85)
        const cCompleted = Math.PI * 75; // ~235.62
        const cPlanned = Math.PI * 85;   // ~267.04

        // Calculando as porcentagens
        const pCompleted = Math.min(completedValue / maxScale, 1);
        const pPlanned = Math.min(plannedValue / maxScale, 1);

        // Disparando as animações das linhas ao carregar
        setTimeout(() => {
            // Animando barra verde
            completedBar.style.strokeDashoffset = cCompleted - (pCompleted * cCompleted);
            
            // Animando barra laranja
            plannedBar.style.strokeDashoffset = cPlanned - (pPlanned * cPlanned);
            
            // Rotacionando a seta laranja com base no valor planejado
            const pointerAngle = pPlanned * 180;
            pointerGroup.style.transform = `rotate(${pointerAngle}deg)`;
        }, 100);

        // Definindo o texto planejado fixo
        valPlanned.innerText = `/${plannedValue}`;

        // Função para animar a subida dos números
        function animateNumber(element, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                
                // Usando uma curva ease-out para o número frear suavemente no fim
                const easeOutProgress = 1 - Math.pow(1 - progress, 3);
                element.innerText = Math.floor(easeOutProgress * (end - start) + start);
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    element.innerText = end;
                }
            };
            window.requestAnimationFrame(step);
        }

        // Dispara a animação do número central
        setTimeout(() => {
            animateNumber(valCompleted, 0, completedValue, 1500);
        }, 100);
    });
</script>
</body>
</html>
